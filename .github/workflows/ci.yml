name: ci

on:
  push:
  pull_request:

jobs:
  contract-check:
    runs-on: ubuntu-latest
    env:
      QW_TEST_MODE: "1"
      QW_TEST_BEARER_TOKEN: "test-token"
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs
        run: bash scripts/validate_docs.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate OpenAPI
        run: bash scripts/validate_openapi.sh

      - name: Validate Schemas
        run: bash scripts/validate_schemas.sh

      - name: Run tests
        run: |
          pwd
          ls -la
          test -f requirements.txt
          python -m pip install -r requirements.txt
          pytest -q
        env:
          PYTHONPATH: .
      - name: Run strict pytest (no xfail)
        run: bash scripts/pytest_strict.sh
