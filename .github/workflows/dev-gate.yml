name: Dev Gate - Automated Delivery Check

# Traceability: run_id | trace_id | audit_id
# This workflow does NOT merge, modify branch protection, or push to main

on:
  push:
    branches:
      - '**'  # All branches except protected ones (handled by branch protection rules)
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Custom run_id (optional)'
        required: false
      trace_id:
        description: 'Custom trace_id (optional)'
        required: false

env:
  PYTHON_VERSION: '3.11'
  RUN_ID: ${{ github.event.inputs.run_id || github.run_id }}
  TRACE_ID: ${{ github.event.inputs.trace_id || github.sha }}
  AUDIT_ID: ${{ github.run_id }}

jobs:
  gate-check:
    name: Gate Check (MRE)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest ruff

      - name: Gate - Compile All
        id: compileall
        run: |
          echo "=== Gate: compileall ==="
          echo "run_id=${{ env.RUN_ID }}"
          echo "trace_id=${{ env.TRACE_ID }}"
          echo "audit_id=${{ env.AUDIT_ID }}"
          python -m compileall -q .
        continue-on-error: true

      - name: Gate - Pytest
        id: pytest
        run: |
          echo "=== Gate: pytest ==="
          pytest -q --tb=short || true
        continue-on-error: true

      - name: Gate - Ruff
        id: ruff
        run: |
          echo "=== Gate: ruff ==="
          ruff check . --quiet || true
        continue-on-error: true

      - name: Gate Summary
        run: |
          echo "=== Gate Summary ==="
          echo "Run ID: ${{ env.RUN_ID }}"
          echo "Trace ID: ${{ env.TRACE_ID }}"
          echo "Audit ID: ${{ env.AUDIT_ID }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Check results
          COMPILE_STATUS="${{ steps.compileall.outcome }}"
          PYTEST_STATUS="${{ steps.pytest.outcome }}"
          RUFF_STATUS="${{ steps.ruff.outcome }}"
          
          echo "compileall: ${COMPILE_STATUS}"
          echo "pytest: ${PYTEST_STATUS}"
          echo "ruff: ${RUFF_STATUS}"
          
          if [[ "${COMPILE_STATUS}" == "success" && "${PYTEST_STATUS}" == "success" && "${RUFF_STATUS}" == "success" ]]; then
            echo "GATE_STATUS=PASSED" >> $GITHUB_ENV
            echo "✅ Gate PASSED"
          else
            echo "GATE_STATUS=FAILED" >> $GITHUB_ENV
            echo "❌ Gate FAILED"
            exit 1
          fi

      - name: Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-audit-${{ env.RUN_ID }}
          path: |
            .gate_logs/
          retention-days: 30

  review-grok:
    name: Review Grok
    runs-on: ubuntu-latest
    needs: gate-check
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Review Grok
        run: |
          echo "=== Review Grok ==="
          echo "run_id=${{ env.RUN_ID }}"
          echo "trace_id=${{ env.TRACE_ID }}"
          echo "audit_id=${{ env.AUDIT_ID }}"
          python tools/qw_review_grok.py || true

      - name: Upload Review Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-report-${{ env.RUN_ID }}
          path: .gate_logs/review_*.json
          retention-days: 30

  preview-deploy:
    name: Preview Deploy (Skeleton)
    runs-on: ubuntu-latest
    needs: [gate-check, review-grok]
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Preview Deploy
        run: |
          echo "=== Preview Deploy (Dry Run) ==="
          echo "run_id=${{ env.RUN_ID }}"
          echo "trace_id=${{ env.TRACE_ID }}"
          echo "audit_id=${{ env.AUDIT_ID }}"
          echo "NOTE: This is a skeleton - no actual deployment"
          python tools/qw_preview_deploy.py preview
          python tools/qw_preview_deploy.py deploy_staging --dry-run

      - name: Upload Preview Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-${{ env.RUN_ID }}
          path: |
            .preview/
            .gate_logs/deploy_*.json
          retention-days: 30
