name: dev-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          pip install -r requirements-dev.txt

      - name: Run strict gate
        env:
          RUN_ID: gha_${{ github.run_id }}
          TRACE_ID: gha_${{ github.run_id }}_${{ github.run_attempt }}
          AUDIT_ID: gha_${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          bash tools/qw_gate.sh
