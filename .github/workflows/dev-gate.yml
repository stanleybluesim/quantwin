name: dev-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read
    env:
      RUN_ID: ${{ github.run_id }}
      TRACE_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      AUDIT_ID: pr-${{ github.event.pull_request.number || github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1 || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gate deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest ruff jsonschema fastapi httpx starlette

      - name: Run Phase 0 gate
        run: |
          bash tools/qw_gate.sh "origin/${{ github.base_ref || 'main' }}" "${{ github.sha }}"

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-artifacts
          path: |
            artifacts/gate/**
            .gate_logs/**
          if-no-files-found: warn

  preview:
    needs: gate
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "preview stage placeholder"

  review:
    needs: [gate, preview]
    if: ${{ needs.gate.result == 'success' && needs.preview.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "review stage placeholder"
