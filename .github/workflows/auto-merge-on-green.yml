name: auto-merge-on-green

on:
  workflow_run:
    workflows: ["dev-gate"]
    types: [completed]
  workflow_dispatch:

jobs:
  auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          PR_NUMBER="$(gh pr list --state open --json number,headRefName --jq ".[] | select(.headRefName==\"${BRANCH_NAME}\") | .number" | head -n1)"
          if [ -z "$PR_NUMBER" ]; then
            echo "No matching PR found; exiting."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Stop when no PR
        if: ${{ steps.pr.outputs.pr_number == '' }}
        run: exit 0

      - name: Fetch base/main
        run: |
          git fetch origin main --depth=1 || true

      - name: Run diff scope
        run: |
          python tools/qw_diff_scope.py --base-ref origin/main --head-ref HEAD

      - name: Require Human-Approval for protected diff or main
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          PROTECTED_COUNT="$(python -c 'import json; d=json.load(open("artifacts/gate/DiffScope.json", encoding="utf-8")); print(len(d.get("protected_domain_hits", [])))')"
          BASE_REF="$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName')"
          LABELS="$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' || true)"

          NEED_APPROVAL=0
          if [ "$PROTECTED_COUNT" -gt 0 ]; then
            NEED_APPROVAL=1
          fi
          if [ "$BASE_REF" = "main" ]; then
            NEED_APPROVAL=1
          fi

          if [ "$NEED_APPROVAL" = "1" ]; then
            echo "$LABELS" | grep -qx "Human-Approval" || {
              echo "FAIL: Human-Approval label required for protected diff or base=main" >&2
              exit 1
            }
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --merge
